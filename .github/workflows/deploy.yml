on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_ROOT }}
          protocol: ftps
          exclude: |
           **/.git*
           **/.git/**
           **/.github/**
           **/.vscode/**
           **/node_modules/**
           **/.DS_Store
           **/.env*
           **/deploy.js
           **/package.json
           **/package-lock.json
           **/logs/**
           **/*.log*
           **/*.gz
           **/last_traffic
           **/info.php5
           **/info.pl
           **/info.py
